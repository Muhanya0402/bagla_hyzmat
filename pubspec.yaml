name: bagla
description: "Bagla project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.1
  shared_preferences: ^2.2.2
  intl: 0.20.2
  provider: ^6.1.2
  pinput: ^5.0.0
  smart_auth: ^3.0.1
  image_picker: ^1.0.7
  flutter_image_compress: ^2.3.0
  # Чтение медиатеки для кастомного инлайн-пикера фото (плитка «Камера» +
  # сетка последних фото в собственном UI) — PhotoPickerSheet.
  photo_manager: ^3.6.0
  
  # Persistent foreground notification для активных заказов курьера/магазина.
  awesome_notifications: ^0.10.0
  
  # Keychain (iOS) / EncryptedSharedPreferences + Keystore (Android)
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  mask_text_input_formatter: ^2.5.0
  dropdown_search: ^5.0.6
  web_socket_channel: ^2.4.0
  
  # Совместимая пара плагинов Firebase, которая без проблем разрешится во Flutter
  firebase_core: ^3.6.0
  firebase_messaging: ^15.2.10
  
  tutorial_coach_mark: ^1.2.11
  animations: ^2.0.11
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/bagla_logo.png"
  image_path_ios: "assets/images/bagla_logo.png" # единый файл для всех платформ
  remove_alpha_ios: true # Apple запрещает прозрачность в иконках
  background_color_ios: "#ffffff" # белый фон, как у Android
  # Adaptive-иконка (Android 8+): белый фон + логотип как foreground.
  # Система сама добавляет safe-zone отступы и маску — иконка аккуратная
  # без отдельного квадратного кропа широкого логотипа.
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/bagla_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/bagla_logo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/bagla_logo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/bagla_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700